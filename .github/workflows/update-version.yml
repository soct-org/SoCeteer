name: Chore (update VERSION from tag)

on:
  workflow_call:

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.ACTIONS_PUSH_TOKEN }} # PAT required to push to main

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          VERSION="${RAW_TAG#v}"
          echo "${VERSION}" | tee VERSION
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure git user
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push VERSION
        shell: bash
        run: |
          if git diff --quiet VERSION; then
            echo "VERSION file already up to date, nothing to commit."
            exit 0
          fi

          git add VERSION
          git commit -m "chore: update VERSION to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main