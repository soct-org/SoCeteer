name: Release Workflow

on:
  push:
    tags: ["v*"]

concurrency:
  group: on-tag-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: soceteer
  REGISTRY: ghcr.io
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

jobs:
  prepare:
    name: Prepare matrices
    uses: ./.github/workflows/prepare-matrix.yml

  update-version:
    name: Update VERSION on main from tag
    needs: prepare
    uses: ./.github/workflows/update-version.yml
    secrets:
      ACTIONS_PUSH_TOKEN: ${{ secrets.ACTIONS_PUSH_TOKEN }}

  docker:
    name: Build docker (multi-arch) + manifest
    needs: [ prepare, update-version ]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      image_name: soceteer

  # Fast tests on all platforms (smoke-check the freshly-built image)
  fast-native:
    name: "[${{ matrix.os }}, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: [prepare, docker]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-native.yml
    with:
      os: ${{ matrix.os }}
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

  fast-docker:
    name: "[docker:${{ needs.prepare.outputs.image_tag }}, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: [prepare, docker]
    strategy:
      fail-fast: false
      matrix:
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-docker.yml
    with:
      chisel: ${{ matrix.chisel }}
      docker_image: ghcr.io/${{ github.repository_owner }}/soceteer:${{ needs.prepare.outputs.image_tag }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

  # Full tests — macOS only (largest runner), one job per config
  full-macos:
    name: "[macos, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: [prepare, docker]
    strategy:
      fail-fast: false
      matrix:
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.full_configs_json) }}
    uses: ./.github/workflows/test-native.yml
    with:
      os: macos-latest
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

