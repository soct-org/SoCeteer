name: Tests (Docker mounted)

on:
  workflow_call:
    inputs:
      chisel:
        required: true
        type: string
      docker_image:
        required: false
        type: string
        default: ghcr.io/${{ github.repository_owner }}/soceteer:latest
      test_name:
        required: true
        type: string
        description: "Config name to test, e.g. RocketB2-64. Runs '<test_name> should run without errors'."

jobs:
  test-docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull docker image
        run: |
          docker pull "${{ inputs.docker_image }}"

      - name: Run test — ${{ inputs.test_name }}
        env:
          SOCT_CHISEL_VERSION: ${{ inputs.chisel }}
          JAVA_TOOL_OPTIONS: >-
            -XX:MaxRAMPercentage=50.0
            -XX:+UseG1GC
            -XX:MinHeapFreeRatio=5
            -XX:MaxHeapFreeRatio=15
            -XX:GCTimeRatio=4
        run: |
          docker run --rm \
            -e SOCT_CHISEL_VERSION="${SOCT_CHISEL_VERSION}" \
            -e JAVA_TOOL_OPTIONS="${JAVA_TOOL_OPTIONS}" \
            -w /work \
            -v "${PWD}:/work" \
            --user "$(id -u):$(id -g)" \
            "${{ inputs.docker_image }}" \
            sbt "testOnly soct.tests.SimulationSpec -- -t \"${{ inputs.test_name }} should run without errors\""
