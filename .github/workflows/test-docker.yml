name: Tests (Docker mounted)

on:
  workflow_call:
    inputs:
      chisel:
        required: true
        type: string
      docker_image:
        required: false
        type: string
        default: ghcr.io/${{ github.repository_owner }}/soceteer:latest
      test_script:
        required: true
        type: string

jobs:
  test-docker:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull docker image
        run: |
          docker pull "${{ inputs.docker_image }}"

      - name: Run tests (docker, mounted workspace)
        env:
          SOCT_CHISEL_VERSION: ${{ inputs.chisel }}
        run: |
          docker run --rm \
            -e SOCT_CHISEL_VERSION="${SOCT_CHISEL_VERSION}" \
            -e SOCT_TEST_RUN_DIR="/tmp/t" \
            -w /work \
            -v "${PWD}:/work" \
            "${{ inputs.docker_image }}" \
            bash -c 'bash "${{ inputs.test_script }}"'
