name: CI Workflow

on:
  push:
    branches: [main, "cicd-*"]
  pull_request:
    branches: [main, "cicd-*"]

concurrency:
  group: on-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare matrices
    uses: ./.github/workflows/prepare-matrix.yml

  # ── Smoke tests (push / PR) ────────────────────────────────────────────────
  # Fast configs only, all platforms.  Full tests run on tags (on-tag.yml).

  fast-native:
    name: "[${{ matrix.os }}, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-native.yml
    with:
      os: ${{ matrix.os }}
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

  fast-docker:
    name: "[docker:latest, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-docker.yml
    with:
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"
