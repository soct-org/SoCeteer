name: CI Workflow

on:
  push:
    branches: [main, "cicd-*"]
  pull_request:
    branches: [main, "cicd-*"]

concurrency:
  group: on-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare matrices
    uses: ./.github/workflows/prepare-matrix.yml

  # ── Fast tests ─────────────────────────────────────────────────────────────
  # Run a small set of fast configs on every OS and Docker to catch
  # cross-platform regressions early on every push/PR.

  fast-native:
    name: "[${{ matrix.os }}, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-native.yml
    with:
      os: ${{ matrix.os }}
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

  fast-docker:
    name: "[docker:latest, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.fast_configs_json) }}
    uses: ./.github/workflows/test-docker.yml
    with:
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"

  # ── Full tests ─────────────────────────────────────────────────────────────
  # macOS-only (largest GitHub-hosted runner), one job per config so each
  # core appears as an individual check in the PR status view.

  full-macos:
    name: "[macos, chisel-${{ matrix.chisel }}] ${{ matrix.config.name }}-${{ matrix.config.xlen }}"
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        chisel: ${{ fromJson(needs.prepare.outputs.chisel_versions_json) }}
        config: ${{ fromJson(needs.prepare.outputs.full_configs_json) }}
    uses: ./.github/workflows/test-native.yml
    with:
      os: macos-latest
      chisel: ${{ matrix.chisel }}
      test_name: "${{ matrix.config.name }}-${{ matrix.config.xlen }}"
